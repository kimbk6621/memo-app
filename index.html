<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>📝 개인 메모앱</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{--bg:#0f172a;--panel:#1e293b;--card:#1e293b;--hover:#2d3a52;--accent:#3b82f6;--accent2:#6366f1;--text:#e2e8f0;--sub:#94a3b8;--dim:#64748b;--border:#334155;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
/* topbar */
.topbar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
/* 검색 */
.search-wrap{position:relative;display:flex;align-items:center;}
.search-input{background:var(--bg);border:1px solid var(--border);border-radius:20px;color:var(--text);padding:6px 32px 6px 14px;font-size:12px;font-family:inherit;width:220px;transition:all .2s;}
.search-input:focus{outline:none;border-color:var(--accent);width:280px;}
.search-clear{position:absolute;right:8px;background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;padding:2px;}
.search-clear:hover{color:var(--text);}
.search-clear.hide{display:none;}
/* 검색 필터 탭 */
.search-filter-row{display:flex;gap:4px;margin-bottom:12px;}
.sfbtn{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--sub);cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s;}
.sfbtn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
/* 검색 결과 */
.search-results-list{display:flex;flex-direction:column;gap:8px;max-height:55vh;overflow-y:auto;padding-right:4px;}
.search-results-list::-webkit-scrollbar{width:4px;}
.search-results-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.search-item{background:var(--card);border-radius:8px;padding:10px 14px;cursor:pointer;border-left:4px solid var(--border);transition:background .15s;}
.search-item:hover{background:var(--hover);}
.search-item-header{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.search-item-kind{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;flex-shrink:0;}
.kind-memo{background:rgba(59,130,246,.15);color:#93c5fd;}
.kind-board{background:rgba(99,102,241,.15);color:#c4b5fd;}
.kind-chat{background:rgba(34,197,94,.12);color:#86efac;}
.search-item-title{font-size:13px;font-weight:700;flex:1;color:var(--text);}
.search-item-body{font-size:12px;color:var(--sub);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.search-item-meta{font-size:10px;color:var(--dim);margin-top:4px;}
.search-highlight{background:rgba(251,191,36,.3);color:#fde047;border-radius:2px;padding:0 2px;}
.search-empty{text-align:center;color:var(--dim);padding:30px 0;font-size:13px;}
/* 온라인 사용자 */
.online-badge{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:#86efac;}
.online-badge.me{background:rgba(59,130,246,.15);border-color:rgba(59,130,246,.4);color:#93c5fd;}
.online-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0;animation:pulse-dot 2s infinite;}
.online-badge.me .online-dot{background:#3b82f6;}
@keyframes pulse-dot{0%,100%{opacity:1;}50%{opacity:.4;}}
.topbar-title{font-size:16px;font-weight:700;color:var(--text);}
.topbar-title span{color:var(--accent);}
.sp{flex:1;}
.tbtn{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--sub);cursor:pointer;font-size:11px;font-family:inherit;position:relative;}
.tbtn:hover{background:var(--hover);color:var(--text);}
.tbtn .badge{position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;font-size:9px;border-radius:8px;min-width:15px;height:15px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
/* layout */
.main{display:flex;flex:1;overflow:hidden;}
/* calendar */
.calp{width:60%;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .25s ease;}
/* 달력 숨김 모드 */
.calp.hidden{width:0;overflow:hidden;border-right:none;}
.cal-toggle-btn{padding:4px 9px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--sub);cursor:pointer;font-size:11px;font-family:inherit;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.cal-toggle-btn:hover{background:var(--hover);color:var(--text);}
.cal-toggle-btn.cal-hidden{color:var(--accent);border-color:var(--accent);}
.calh{display:flex;flex-direction:column;gap:4px;padding:7px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.calh-row1{display:flex;align-items:center;gap:5px;}
.calh-row2{display:flex;align-items:center;gap:4px;}
.week-range-tabs{display:flex;gap:2px;}
.wrtab{padding:3px 7px;border-radius:5px;border:1px solid var(--border);background:none;color:var(--dim);cursor:pointer;font-size:10px;font-family:inherit;transition:all .15s;white-space:nowrap;}
.wrtab.on{background:var(--accent2);color:#fff;border-color:var(--accent2);}
/* 지난 메모 탭 */
.vtab.past{border-color:rgba(239,68,68,.4);color:#fca5a5;}
.vtab.past.on{background:#7f1d1d;color:#fca5a5;border-color:#ef4444;}
.calnav{width:24px;height:24px;border-radius:5px;border:1px solid var(--border);background:none;color:var(--text);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.calnav:hover{background:var(--hover);}
.calml{font-size:12px;font-weight:700;flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.btnadd{padding:5px 12px;border-radius:6px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;}
.btnadd:hover{background:var(--accent2);}
/* cal grid */
.calg{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.calwd{display:grid;grid-template-columns:0.5fr repeat(5,1fr) 1fr;flex-shrink:0;border-bottom:1px solid var(--border);}
.wd{text-align:center;font-size:12px;color:var(--dim);padding:5px 0;border-right:1px solid var(--border);}
.wd:last-child{border-right:none;}
.wd:first-child{color:#f87171;}
.wd:nth-child(7){color:#60a5fa;}
.cald{display:grid;grid-template-columns:0.5fr repeat(5,1fr) 1fr;flex:1;overflow:hidden;}
.cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:3px 3px;cursor:pointer;display:flex;flex-direction:column;gap:1px;overflow:hidden;min-height:0;background:var(--bg);transition:background .1s;}
.cell:nth-child(7n){border-right:none;}
.cell:hover{background:var(--hover);}
.cell.other{background:#0a1020;cursor:default;}
.cell.other:hover{background:#0a1020;}
.cell.thismonth{background:#16203a;}
.cell.thismonth:hover{background:var(--hover);}
.cell.today{background:#172554!important;}
.cell.selected{background:#1e3a5f!important;outline:2px solid var(--accent);outline-offset:-2px;}
.daynum{font-size:13px;font-weight:600;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cell.today .daynum{background:var(--accent);color:#fff!important;}
.cell.selected .daynum{background:var(--accent2);color:#fff!important;}
.cell.sun .daynum{color:#f87171;}
.cell.sat .daynum{color:#60a5fa;}
.cell.other .daynum{color:var(--dim);}
/* chips */
.chips{display:flex;flex-direction:column;gap:1px;overflow:hidden;flex:1;}
.chip{font-size:11px;padding:1px 4px;border-radius:2px;border-left:3px solid;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;background:rgba(255,255,255,.05);}
.chip-holi{font-size:11px;padding:1px 3px;border-radius:2px;color:#fca5a5;background:rgba(239,68,68,.15);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;}
.chip-solar{font-size:11px;padding:1px 3px;border-radius:2px;color:#86efac;background:rgba(34,197,94,.12);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;}
.chip-anniv{font-size:11px;padding:1px 3px;border-radius:2px;color:#fcd34d;background:rgba(234,179,8,.15);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;}
.morechip{font-size:10px;color:var(--dim);padding:0 3px;flex-shrink:0;}
/* memo panel */
.memp{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.memh{display:flex;align-items:center;gap:6px;padding:9px 12px;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;flex-wrap:wrap;}
.memhdate{font-size:15px;font-weight:700;flex:1;}
.vtabs{display:flex;gap:3px;}
.vtab{padding:5px 10px;border-radius:5px;border:1px solid var(--border);background:none;color:var(--sub);cursor:pointer;font-size:13px;font-family:inherit;}
.vtab.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.meml{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}
.meml::-webkit-scrollbar{width:4px;}
.meml::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.meml.grid-mode{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;align-items:start;}
/* 달력 없는 전체화면 모드 - 3열 */
.cal-hidden-mode .meml.grid-mode{grid-template-columns:repeat(3,1fr);}
.cal-hidden-mode .memhdate{font-size:16px;}
.empty{text-align:center;color:var(--dim);padding:40px 0;font-size:13px;grid-column:1/-1;}
/* memo card */
.mcard{background:#263046;border-radius:8px;padding:10px 12px;border-left:4px solid #3b82f6;}
.mcard.blink{animation:bk 1s infinite;}
@keyframes bk{0%,100%{box-shadow:0 0 0 0 rgba(251,191,36,0)}50%{box-shadow:0 0 0 5px rgba(251,191,36,.4)}}
.mct{display:flex;align-items:flex-start;gap:7px;}
.mctitle{font-size:15px;font-weight:700;flex:1;word-break:break-all;}
.mcacts{display:flex;gap:3px;flex-shrink:0;}
.mcbtn{background:none;border:none;cursor:pointer;color:var(--dim);font-size:16px;padding:2px 4px;border-radius:4px;}
.mcbtn:hover{color:var(--text);background:var(--border);}
.mcbody{margin-top:4px;font-size:14px;color:var(--sub);line-height:1.5;}
.mcfoot{margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.dbadge{font-size:11px;background:var(--bg);padding:2px 7px;border-radius:20px;border:1px solid var(--border);color:var(--dim);}
.abadge{font-size:11px;background:rgba(251,191,36,.12);color:#fbbf24;padding:2px 7px;border-radius:20px;}
/* 축소 카드 (전체보기 그리드 모드) */
.mcard.compact{padding:7px 9px;border-radius:7px;}
.mcard.compact .mctitle{font-size:12px;}
.mcard.compact .mcbtn{font-size:12px;padding:1px 3px;}
.mcard.compact .mcbody{font-size:12px;margin-top:3px;max-height:72px;overflow:hidden;line-height:1.5;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;}
.mcard.compact .mcfoot{margin-top:4px;gap:4px;}
.mcard.compact .dbadge,.mcard.compact .abadge{font-size:9px;padding:1px 5px;}
.mcard.compact .mct{gap:5px;}
/* 주별 그룹 헤더 */
.week-header{grid-column:1/-1;font-size:13px;font-weight:700;color:var(--accent);padding:8px 4px 2px;border-bottom:1px solid var(--border);margin-bottom:2px;}
.week-header:first-child{padding-top:0;}
/* modal */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center;}
.ov.on{display:flex;}
.modal{background:#1e293b;border-radius:12px;border:1px solid var(--border);width:480px;max-width:95vw;max-height:92vh;overflow-y:auto;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.modal h2{font-size:15px;margin-bottom:14px;}
.fr{margin-bottom:10px;}
.fl{font-size:11px;color:var(--sub);margin-bottom:4px;display:block;}
.fi,.fta{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:7px 10px;font-size:13px;font-family:inherit;}
.fi:focus,.fta:focus{outline:none;border-color:var(--accent);}
.fta{min-height:80px;resize:vertical;}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cswatches{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px;}
.csw{width:24px;height:24px;border-radius:5px;cursor:pointer;border:3px solid transparent;transition:transform .1s;}
.csw:hover{transform:scale(1.2);}
.csw.on{border-color:#fff;transform:scale(1.15);}
.chkl{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;color:var(--sub);}
.chkl input{accent-color:var(--accent);}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;}
.bcnl{padding:7px 16px;border-radius:7px;background:none;border:1px solid var(--border);color:var(--sub);cursor:pointer;font-size:12px;font-family:inherit;}
.bcnl:hover{background:var(--hover);color:var(--text);}
.bsav{padding:7px 16px;border-radius:7px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;}
.bsav:hover{background:var(--accent2);}
input[type=range]{accent-color:var(--accent);}
/* anniv list */
.anl{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto;margin-bottom:10px;}
/* 휴지통 */
.trash-list{display:flex;flex-direction:column;gap:6px;max-height:380px;overflow-y:auto;margin-bottom:10px;}
.trash-item{display:flex;align-items:center;gap:10px;background:var(--bg);border-radius:7px;padding:9px 12px;}
.trash-info{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0;}
.trash-kind{font-size:11px;color:var(--accent);font-weight:600;}
.trash-title{font-size:13px;color:var(--text);word-break:break-all;}
.trash-meta{font-size:10px;color:var(--dim);}
.ani{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:5px;padding:6px 10px;font-size:12px;}
.anid{color:var(--accent);min-width:70px;}
.anir{color:var(--dim);font-size:10px;min-width:28px;}
.anin{flex:1;color:var(--text);}
.anidel{background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;padding:2px;}
.anidel:hover{color:#ef4444;}
.anadd{display:grid;grid-template-columns:120px 1fr 90px auto;gap:6px;align-items:center;}
.anadd select{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 8px;font-size:12px;font-family:inherit;}
.baadd{padding:6px 12px;border-radius:6px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:12px;font-family:inherit;}

/* 메인탭 */
.maintabs{display:flex;gap:4px;padding:0 14px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
.mtab{padding:9px 16px;border:none;background:none;color:var(--sub);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;border-bottom:3px solid transparent;position:relative;}
.mtab.on{color:var(--accent);border-bottom-color:var(--accent);}
.mtab .badge{position:absolute;top:5px;right:4px;background:#ef4444;color:#fff;font-size:9px;border-radius:8px;min-width:15px;height:15px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
.mtab .badge.hide{display:none;}
.page{display:none;flex:1;overflow:hidden;}
.page.on{display:flex;}

/* 채팅 */
.chatwrap{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.chathead{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;}
.chatlist{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.chatlist::-webkit-scrollbar{width:5px;}
.chatlist::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.chatmsg{max-width:62%;display:flex;flex-direction:column;gap:3px;}
.chatmsg.me{align-self:flex-end;align-items:flex-end;}
.chatmsg.other{align-self:flex-start;align-items:flex-start;}
.chatauthor{font-size:11px;color:var(--dim);padding:0 4px;}
.chatbubble{padding:9px 13px;border-radius:14px;font-size:14px;line-height:1.5;word-break:break-word;white-space:pre-wrap;}
.chatmsg.me .chatbubble{background:var(--accent);color:#fff;border-radius:14px 14px 4px 14px;}
.chatmsg.other .chatbubble{background:var(--card);color:var(--text);border-radius:14px 14px 14px 4px;}
.chattime{font-size:10px;color:var(--dim);padding:0 4px;}
.chatinputrow{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border);background:var(--panel);flex-shrink:0;}
.chatinput{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:20px;color:var(--text);padding:10px 16px;font-size:14px;font-family:inherit;resize:none;max-height:90px;}
.chatinput:focus{outline:none;border-color:var(--accent);}
.chatsend{padding:10px 18px;border-radius:20px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;flex-shrink:0;}
.chatsend:hover{background:var(--accent2);}

/* 게시판 */
.boardwrap{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.boardtoolbar{display:flex;justify-content:flex-end;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;}
.boardlist{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.boardlist::-webkit-scrollbar{width:5px;}
.boardlist::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.boardpost{background:var(--card);border-radius:10px;padding:14px 16px;border-left:4px solid var(--accent);}
.boardpost.blink{animation:bk 1s infinite;}
.bptop{display:flex;align-items:flex-start;gap:8px;}
.bptitle{font-size:15px;font-weight:700;flex:1;word-break:break-all;}
.bpacts{display:flex;gap:3px;flex-shrink:0;}
.bpbody{margin-top:6px;font-size:14px;color:var(--sub);line-height:1.6;white-space:pre-wrap;}
.bpfoot{margin-top:8px;display:flex;gap:8px;align-items:center;font-size:11px;color:var(--dim);}

/* 승부예측 (이름+점수 수기 입력 방식) */
.predict-card{background:var(--card);border-radius:10px;padding:12px 14px;border-left:4px solid var(--accent2);}
.predict-card-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.predict-title{font-size:17px;font-weight:700;flex:1;}
.predict-table{width:100%;border-collapse:collapse;font-size:16px;}
.predict-table th{background:rgba(255,255,255,.06);color:var(--sub);font-size:14px;font-weight:600;padding:6px 10px;border:1px solid var(--border);text-align:center;}
.predict-table td{padding:6px 10px;border:1px solid var(--border);text-align:center;color:var(--text);}
.predict-table tr:hover td{background:rgba(255,255,255,.03);}
.predict-table .rank-1{color:#fbbf24;font-weight:700;}
.predict-table .rank-2{color:#94a3b8;font-weight:600;}
.predict-table .rank-3{color:#b45309;}
.predict-foot{display:flex;align-items:center;gap:6px;margin-top:8px;padding-top:6px;border-top:1px solid var(--border);font-size:11px;color:var(--dim);}
.predict-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;margin-left:auto;}
.predict-del:hover{color:#ef4444;}
.predict-edit-btn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;}
.predict-edit-btn:hover{color:var(--text);}
.predict-lock{font-size:10px;background:rgba(234,179,8,.12);color:#fbbf24;padding:1px 6px;border-radius:10px;border:1px solid rgba(234,179,8,.3);}
/* 작성 모달 행 */
.pf-row{display:grid;grid-template-columns:1fr 1fr auto;gap:6px;align-items:center;}
.pf-row-hdr{display:grid;grid-template-columns:1fr 1fr auto;gap:6px;margin-bottom:4px;}
.pf-row-hdr span{font-size:11px;color:var(--dim);padding:0 2px;}

/* 댓글 */
.comment-section{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.comment-title{font-size:11px;color:var(--dim);margin-bottom:6px;font-weight:600;}
.comment-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
.comment-item{background:var(--bg);border-radius:6px;padding:7px 10px;}
.comment-header{display:flex;align-items:center;gap:6px;margin-bottom:2px;}
.comment-author{font-size:11px;font-weight:700;color:var(--accent);}
.comment-time{font-size:10px;color:var(--dim);}
.comment-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:11px;margin-left:auto;padding:1px 3px;border-radius:3px;}
.comment-del:hover{color:#ef4444;}
.comment-body{font-size:12px;color:var(--text);line-height:1.4;}
.comment-input-row{display:flex;gap:6px;}
.comment-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:20px;color:var(--text);padding:6px 12px;font-size:12px;font-family:inherit;}
.comment-input:focus{outline:none;border-color:var(--accent);}
.comment-send{padding:6px 12px;border-radius:20px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:12px;font-family:inherit;flex-shrink:0;}
.comment-send:hover{background:var(--accent2);}
/* 비밀번호 보호 */
.lock-badge{font-size:10px;background:rgba(234,179,8,.12);color:#fbbf24;padding:2px 7px;border-radius:10px;border:1px solid rgba(234,179,8,.3);}
.pw-modal-inner{background:var(--panel);border-radius:12px;border:1px solid var(--border);padding:22px;width:320px;text-align:center;}
.pw-modal-inner h3{font-size:15px;margin-bottom:14px;}
.pw-modal-inner .fi{text-align:center;margin-bottom:12px;}

/* 승부예측 */
.predict-card{background:var(--card);border-radius:10px;padding:12px 14px;border-left:4px solid var(--accent2);margin-bottom:0;}
.predict-title{font-size:14px;font-weight:700;margin-bottom:8px;}
.predict-options{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.predict-option{display:flex;flex-direction:column;gap:2px;}
.predict-option-row{display:flex;align-items:center;gap:6px;}
.predict-option-btn{flex:1;text-align:left;padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.predict-option-btn:hover{border-color:var(--accent);background:rgba(59,130,246,.08);}
.predict-option-btn.voted{border-color:var(--accent);background:rgba(59,130,246,.2);font-weight:700;color:#93c5fd;}
.predict-bar-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.predict-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .4s;}
.predict-meta{font-size:10px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.predict-foot{display:flex;align-items:center;gap:6px;margin-top:8px;padding-top:6px;border-top:1px solid var(--border);font-size:11px;color:var(--dim);flex-wrap:wrap;}
.predict-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;margin-left:auto;}
.predict-del:hover{color:#ef4444;}
.pf-option-row{display:flex;gap:6px;align-items:center;}
.predict-lock{font-size:10px;background:rgba(234,179,8,.12);color:#fbbf24;padding:1px 6px;border-radius:10px;border:1px solid rgba(234,179,8,.3);}

/* 게시판 에디터 (엑셀표/이미지 삽입) */
.board-toolbar{display:flex;align-items:center;gap:8px;margin:4px 0 6px;}
.board-editable{min-height:160px;max-height:340px;overflow-y:auto;line-height:1.5;}
.board-editable:empty:before{content:attr(data-placeholder);color:var(--dim);}
.board-editable img{max-width:100%;border-radius:6px;margin:4px 0;display:block;}
.board-editable table,.bpbody table{border-collapse:collapse;margin:6px 0;font-size:12px;max-width:100%;display:block;overflow-x:auto;}
.board-editable td,.board-editable th,.bpbody td,.bpbody th{border:1px solid var(--border);padding:4px 8px;white-space:nowrap;}
.board-editable th,.bpbody th{background:rgba(255,255,255,.06);font-weight:700;}
.bpbody img{max-width:100%;border-radius:6px;margin:6px 0;display:block;cursor:zoom-in;}
.bpbody table{display:table;width:auto;}

/* 첨부 링크 카드 */
.attach-input-row{display:flex;gap:6px;align-items:center;}
.attach-input-row .fi{font-size:12px;padding:6px 10px;}
.attach-card{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;text-decoration:none;transition:background .15s;}
.attach-card:hover{background:var(--hover);}
.attach-icon{font-size:22px;flex-shrink:0;}
.attach-info{flex:1;min-width:0;}
.attach-name{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.attach-url{font-size:10px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.attach-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px;padding:2px 4px;border-radius:4px;flex-shrink:0;}
.attach-del:hover{color:#ef4444;}
/* 게시글 내 첨부 카드 */
.bp-attachments{display:flex;flex-direction:column;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.bp-attachments .attach-label{font-size:11px;color:var(--dim);}

/* 이미지 확대보기 */
#img-viewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;align-items:center;justify-content:center;cursor:zoom-out;}
#img-viewer.on{display:flex;}
#img-viewer img{max-width:92vw;max-height:92vh;border-radius:6px;}

/* 화면 전체 플래시 알림 */
#screen-flash{position:fixed;inset:0;pointer-events:none;z-index:9999;background:rgba(59,130,246,0);transition:background .15s;}
#screen-flash.flashing{animation:screenflash 0.6s ease-out 3;}
@keyframes screenflash{0%{background:rgba(59,130,246,0);}50%{background:rgba(59,130,246,.35);}100%{background:rgba(59,130,246,0);}}
</style>
</head>
<body>
<div id="screen-flash"></div>
<div id="img-viewer"><img id="img-viewer-img" src=""></div>

<div class="topbar">
  <div class="topbar-title">📝 <span>개인</span> 메모</div>
  <div class="search-wrap">
    <input class="search-input" id="search-input" type="text" placeholder="🔍 메모·게시판·채팅 검색...">
    <button class="search-clear hide" id="search-clear">✕</button>
  </div>
  <button class="tbtn" id="btn-anniv">🎂 기념일 관리</button>
  <button class="tbtn" id="btn-trash">🗑️ 휴지통 <span class="badge hide" id="trash-badge">0</span></button>
  <button class="tbtn" id="btn-myname">👤 <span id="myname-label">이름설정</span></button>
  <span id="sync-status" style="font-size:11px;color:var(--dim);">☁️ 연결 중...</span>
  <div id="online-users" style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;"></div>
  <div class="sp"></div>
</div>

<div class="maintabs">
  <button class="mtab on" id="mtab-cal">📅 달력/메모</button>
  <button class="mtab" id="mtab-chat">💬 채팅 <span class="badge hide" id="chat-badge">0</span></button>
  <button class="mtab" id="mtab-board">📌 게시판 <span class="badge hide" id="board-badge">0</span></button>
  <button class="mtab" id="mtab-board2">📁 자료실</button>
  <button class="mtab" id="mtab-predict">🏆 승부예측</button>
</div>

<div class="page on" id="page-cal">
<div class="main">
  <div class="calp">
    <div class="calh">
      <div class="calh-row1">
        <button class="calnav" id="btn-prev">&#8249;</button>
        <div class="calml" id="cal-label"></div>
        <button class="calnav" id="btn-next">&#8250;</button>
        <button class="tbtn" id="btn-today" style="font-weight:600;font-size:10px;padding:3px 7px;">📍오늘</button>
        <button class="btnadd" id="btn-open-add" style="font-size:11px;padding:5px 10px;">+ 메모</button>
      </div>
      <div class="calh-row2">
        <div class="week-range-tabs">
          <button class="wrtab on" data-weeks="0">월별</button>
          <button class="wrtab" data-weeks="3">전·이·다음주</button>
          <button class="wrtab" data-weeks="5">5주</button>
        </div>
      </div>
    </div>
    <div class="calg">
      <div class="calwd">
        <div class="wd">일</div><div class="wd">월</div><div class="wd">화</div>
        <div class="wd">수</div><div class="wd">목</div><div class="wd">금</div><div class="wd">토</div>
      </div>
      <div class="cald" id="cal-days"></div>
    </div>
  </div>

  <div class="memp">
    <div class="memh">
      <button class="cal-toggle-btn" id="btn-cal-toggle" title="달력 숨기기/보이기">◀ 달력</button>
      <div class="memhdate" id="mem-date-label" title="클릭하면 오늘로 이동" style="cursor:pointer;">전체 메모</div>
      <div class="vtabs">
        <button class="vtab" id="tab-day">일별</button>
        <button class="vtab" id="tab-range">기간별</button>
        <button class="vtab on" id="tab-all">전체</button>
        <button class="vtab past" id="tab-past">⏰ 지난 메모</button>
      </div>
    </div>
    <div class="meml" id="memo-list"></div>
  </div>
</div>
</div>

<!-- 채팅 페이지 -->
<div class="page" id="page-chat">
  <div class="chatwrap">
    <div class="chathead">
      <span style="font-size:13px;color:var(--sub);">💬 채팅</span>
      <div class="sp"></div>
      <button class="tbtn" id="btn-chat-clear">🗑️ 대화 내용 지우기</button>
    </div>
    <div class="chatlist" id="chat-list"></div>
    <div class="chatinputrow">
      <textarea class="chatinput" id="chat-input" placeholder="메시지를 입력하세요... (Enter로 전송, Shift+Enter 줄바꿈)" rows="1"></textarea>
      <button class="chatsend" id="btn-chat-send">전송</button>
    </div>
  </div>
</div>

<!-- 게시판 페이지 -->
<div class="page" id="page-board">
  <div class="boardwrap">
    <div class="boardtoolbar">
      <button class="btnadd" id="btn-open-board">+ 글쓰기</button>
    </div>
    <div class="boardlist" id="board-list"></div>
  </div>
</div>

<!-- 게시판2 페이지 -->
<div class="page" id="page-board2">
  <div class="boardwrap">
    <div class="boardtoolbar">
      <span style="font-size:13px;color:var(--sub);flex:1;">📁 자료실</span>
      <button class="btnadd" id="btn-open-board2">+ 글쓰기</button>
    </div>
    <div class="boardlist" id="board2-list"></div>
  </div>
</div>


<!-- 승부예측 페이지 -->
<div class="page" id="page-predict">
  <div class="boardwrap">
    <div class="boardtoolbar">
      <span style="font-size:13px;color:var(--sub);flex:1;">🏆 승부예측 — 이름·점수 직접 입력</span>
      <button class="btnadd" id="btn-open-predict">+ 예측 만들기</button>
    </div>
    <div class="boardlist" id="predict-list" style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;align-items:start;"></div>
  </div>
</div>

<!-- 승부예측 작성/편집 모달 -->
<div class="ov" id="ov-predict">
  <div class="modal" style="width:520px;">
    <h2 id="predict-modal-ttl">예측 만들기</h2>
    <div class="fr"><label class="fl">제목 (예: 6/20 야구 한화 vs 두산)</label><input class="fi" id="pf-title" placeholder="예측 제목"></div>
    <div class="fr">
      <label class="fl">참가자별 예측 입력 (이름 + 점수/예측내용)</label>
      <div id="pf-rows-list" style="display:flex;flex-direction:column;gap:5px;margin-bottom:6px;max-height:300px;overflow-y:auto;"></div>
      <button class="tbtn" id="btn-predict-add-row" style="font-size:12px;margin-top:4px;">+ 행 추가</button>
    </div>
    <div class="fr"><label class="fl">마감일 (선택)</label><input class="fi" type="datetime-local" id="pf-deadline"></div>
    <div class="fr">
      <label class="chkl"><input type="checkbox" id="pf-pw-on"> 🔒 수정/삭제 비밀번호 설정</label>
      <div id="pf-pw-row" style="display:none;margin-top:6px;">
        <input class="fi" type="password" id="pf-pw" placeholder="비밀번호 입력" style="font-size:13px;">
      </div>
    </div>
    <div class="mbtns">
      <button class="bcnl" id="btn-predict-cancel">취소</button>
      <button class="bsav" id="btn-predict-save">저장</button>
    </div>
  </div>
</div>


<!-- 메모 추가/편집 모달 -->
<div class="ov" id="ov-memo">
  <div class="modal">
    <h2 id="modal-ttl">메모 추가</h2>
    <div class="fr"><label class="fl">제목</label><input class="fi" id="f-title" placeholder="메모 제목"></div>
    <div class="fr"><label class="fl">내용</label><textarea class="fta" id="f-body" placeholder="내용 입력..."></textarea></div>
    <div class="fr2">
      <div class="fr"><label class="fl">시작일</label><input class="fi" type="date" id="f-start"></div>
      <div class="fr"><label class="fl">종료일 (선택)</label><input class="fi" type="date" id="f-end"></div>
    </div>
    <div class="fr"><label class="fl">색상 (테두리)</label><div class="cswatches" id="swatches"></div></div>
    <div class="fr2">
      <div class="fr"><label class="fl">글자색</label><div class="cswatches" id="swatches-text"></div></div>
      <div class="fr"><label class="fl">바탕색</label><div class="cswatches" id="swatches-bg"></div></div>
    </div>
    <div class="fr"><label class="chkl"><input type="checkbox" id="f-blink"> ✨ 항상 깜빡이게 표시 (강조)</label></div>
    <div class="fr"><label class="chkl"><input type="checkbox" id="f-alarm"> 🔔 알림 설정</label></div>
    <div id="alarm-rows" style="display:none">
      <div class="fr2">
        <div class="fr"><label class="fl">알림 날짜</label><input class="fi" type="date" id="f-adate"></div>
        <div class="fr"><label class="fl">알림 시각</label><input class="fi" type="time" id="f-atime"></div>
      </div>
    </div>
    <div class="mbtns">
      <button class="bcnl" id="btn-modal-cancel">취소</button>
      <button class="bsav" id="btn-modal-save">저장</button>
    </div>
  </div>
</div>

<!-- 검색 결과 모달 -->
<div class="ov" id="ov-search">
  <div class="modal" style="width:620px;max-height:80vh;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
      <h2 style="margin:0;flex:1;">🔍 검색 결과</h2>
      <span id="search-result-count" style="font-size:12px;color:var(--dim);"></span>
      <button class="bcnl" id="btn-search-close">닫기</button>
    </div>
    <div class="search-filter-row">
      <button class="sfbtn on" data-filter="all">전체</button>
      <button class="sfbtn" data-filter="memo">📝 메모</button>
      <button class="sfbtn" data-filter="board">📌 게시판</button>
      <button class="sfbtn" data-filter="chat">💬 채팅</button>
    </div>
    <div id="search-results"></div>
  </div>
</div>

<!-- 휴지통 모달 -->
<div class="ov" id="ov-trash">
  <div class="modal" style="width:520px;">
    <h2>🗑️ 휴지통 <span style="font-size:11px;color:var(--dim);font-weight:400;">(삭제 후 7일간 보관, 이후 자동 영구삭제)</span></h2>
    <div class="trash-list" id="trash-list"></div>
    <div class="mbtns"><button class="bsav" id="btn-trash-close">닫기</button></div>
  </div>
</div>

<!-- 기념일 모달 -->
<div class="ov" id="ov-anniv">
  <div class="modal" style="width:460px;">
    <h2>🎂 개인 기념일 관리</h2>
    <p style="font-size:11px;color:var(--dim);margin-bottom:10px;">매년 반복 또는 특정일 기념일을 등록하세요.</p>
    <div class="anl" id="anniv-list"></div>
    <div style="border-top:1px solid var(--border);padding-top:10px;">
      <label class="fl" style="margin-bottom:6px;">새 기념일 추가</label>
      <div class="anadd">
        <input class="fi" type="date" id="an-date" style="font-size:12px;padding:6px 8px;">
        <input class="fi" id="an-name" placeholder="기념일 이름" style="font-size:12px;padding:6px 8px;">
        <select id="an-repeat"><option value="1">매년 반복</option><option value="0">해당 연도만</option></select>
        <button class="baadd" id="btn-anniv-add">추가</button>
      </div>
    </div>
    <div class="mbtns"><button class="bsav" id="btn-anniv-close">닫기</button></div>
  </div>
</div>

<!-- 자료실(board2) 글쓰기 모달 (게시판과 완전 분리) -->
<div class="ov" id="ov-board2">
  <div class="modal" style="width:680px;">
    <h2 id="board2-modal-ttl">자료실 글쓰기</h2>
    <div class="fr"><label class="fl">제목</label><input class="fi" id="b2f-title" placeholder="제목"></div>
    <div class="fr"><label class="fl">내용 (이미지/표 붙여넣기 가능)</label>

        <button type="button" class="tbtn" id="btn-b2-insert-img">🖼️ 이미지 삽입</button>

    <div class="fr">
      <label class="chkl"><input type="checkbox" id="b2f-pw-on"> 🔒 수정/삭제 비밀번호 설정</label>
      <div id="b2f-pw-row" style="display:none;margin-top:6px;">
        <input class="fi" type="password" id="b2f-pw" placeholder="비밀번호 입력" style="font-size:13px;">
      </div>
    </div>
    <div class="mbtns">
      <button class="bcnl" id="btn-board2-cancel">취소</button>
      <button class="bsav" id="btn-board2-save">저장</button>
    </div>
  </div>
</div>

<!-- 비밀번호 확인 모달 -->
<div class="ov" id="ov-pw">
  <div class="pw-modal-inner">
    <h3>🔒 비밀번호 확인</h3>
    <p style="font-size:12px;color:var(--dim);margin-bottom:12px;" id="pw-modal-desc">수정/삭제하려면 비밀번호를 입력하세요.</p>
    <input class="fi" type="password" id="pw-input" placeholder="비밀번호 입력" style="margin-bottom:12px;text-align:center;">
    <div class="mbtns" style="justify-content:center;">
      <button class="bcnl" id="btn-pw-cancel">취소</button>
      <button class="bsav" id="btn-pw-confirm">확인</button>
    </div>
  </div>
</div>

<!-- 게시판 글쓰기 모달 -->
<div class="ov" id="ov-board">
  <div class="modal" style="width:680px;">
    <h2 id="board-modal-ttl">게시글 작성</h2>
    <div class="fr"><label class="fl">제목</label><input class="fi" id="bf-title" placeholder="게시글 제목"></div>

// ── 상태 ──
let memos=[], annivs=[], cy, cm, selDate, curView='all', editId=null, selColor=COLORS[0].h, selTextColor=TEXT_COLORS[0].h, selBgColor=BG_COLORS[0].h, alarmTimers={};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── 특별일 조회 ──
function getSpecials(dateStr){
  const mmdd=dateStr.slice(5);
  const res=[];
  if(HOLIDAYS[mmdd])res.push({t:'holi',l:HOLIDAYS[mmdd]});
  if(LUNAR_H[dateStr])res.push({t:'holi',l:LUNAR_H[dateStr]});
  if(SOLAR[mmdd])res.push({t:'solar',l:SOLAR[mmdd]});
  annivs.forEach(a=>{
    if(a.repeat==='1'&&a.date.slice(5)===mmdd)res.push({t:'anniv',l:a.name});
    else if(a.repeat==='0'&&a.date===dateStr)res.push({t:'anniv',l:a.name});
  });
  return res;
}

// ── 달력 렌더 ──
function renderCal(){
  const prevM=cm===0?11:cm-1, prevY=cm===0?cy-1:cy;
  const nextM=cm===11?0:cm+1, nextY=cm===11?cy+1:cy;
  const mn=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  const todayStr=ds(new Date());

  // 날짜→메모 맵
  const dmap={};
  memos.forEach(m=>{
    if(!m.start)return;
    const ed=m.end&&m.end!==m.start?m.end:m.start;
    let d=new Date(m.start+'T00:00:00'), end=new Date(ed+'T00:00:00');
    while(d<=end){const s=ds(d);if(!dmap[s])dmap[s]=[];dmap[s].push(m);d.setDate(d.getDate()+1);}
  });

  let rStart, nEnd;

  if(calWeekRange===0){
    // 기본 모드: 전달 마지막 주 + 이번달 전체 + 다음달 첫 2주
    const prevLastDay=new Date(cy,cm,0);
    rStart=new Date(prevLastDay);
    rStart.setDate(prevLastDay.getDate()-prevLastDay.getDay());
    nEnd=new Date(nextY,nextM,14);
    nEnd.setDate(nEnd.getDate()+(6-nEnd.getDay()));
    document.getElementById('cal-label').textContent=
      prevY+'년 '+mn[prevM]+' 마지막주 ~ '+nextY+'년 '+mn[nextM]+' 2주';
  }else{
    // 주 단위 모드: 이번주 중심 N주
    const today=new Date();
    const thisWeekSun=new Date(today);
    thisWeekSun.setDate(today.getDate()-today.getDay());
    const before=Math.floor((calWeekRange-1)/2);
    const after=calWeekRange-1-before;
    rStart=new Date(thisWeekSun);
    rStart.setDate(thisWeekSun.getDate()-before*7);
    nEnd=new Date(thisWeekSun);
    nEnd.setDate(thisWeekSun.getDate()+after*7+6);
    document.getElementById('cal-label').textContent=
      calWeekRange===3?'전주 · 이번주 · 다음주':calWeekRange+'주 표시';
  }

  const totalRows=Math.ceil(((nEnd-rStart)/86400000+1)/7);

  const cont=document.getElementById('cal-days');
  cont.innerHTML='';
  cont.style.gridTemplateRows='repeat('+totalRows+',1fr)';

  let cur=new Date(rStart), curMKey=-1;
  for(let i=0;i<totalRows*7;i++){
    const dstr=ds(cur);
    const dm=cur.getMonth(), dy=cur.getFullYear(), dd=cur.getDate(), dow=cur.getDay();
    const isThis=(dy===cy&&dm===cm);
    const isPrev=(dy===prevY&&dm===prevM);
    const isNext=(dy===nextY&&dm===nextM);
    const isOther=!isThis&&!isPrev&&!isNext;

    const cell=document.createElement('div');
    cell.className='cell'+(isOther?' other':'')+(isThis?' thismonth':'')+(dow===0?' sun':dow===6?' sat':'')+(dstr===todayStr?' today':'')+(dstr===selDate?' selected':'');

    const mkey=dy*100+dm;
    const showM=mkey!==curMKey&&!isOther;
    if(showM)curMKey=mkey;

    const dn=document.createElement('div');dn.className='daynum';
    if(showM||dd===1){dn.innerHTML='<span style="font-size:8px;display:block;line-height:1;color:var(--sub)">'+(dm+1)+'월</span>'+dd;}
    else{dn.textContent=dd;}
    cell.appendChild(dn);

    if(!isOther){
      // 특별일
      const specs=getSpecials(dstr);
      const chips=document.createElement('div');chips.className='chips';
      specs.forEach(s=>{
        const c=document.createElement('div');
        c.className=s.t==='holi'?'chip-holi':s.t==='solar'?'chip-solar':'chip-anniv';
        c.textContent=s.l;c.title=s.l;chips.appendChild(c);
      });
      // 메모 칩
      const dm2=dmap[dstr]||[];
      const max=2;
      dm2.slice(0,max).forEach(m=>{
        const c=document.createElement('div');c.className='chip';
        c.style.borderLeftColor=m.color||'#3b82f6';c.style.color=m.color||'#3b82f6';
        c.textContent=m.title||'(제목없음)';c.title=m.title||'';chips.appendChild(c);
      });
      if(dm2.length>max){const mc=document.createElement('div');mc.className='morechip';mc.textContent='+'+(dm2.length-max)+'개';chips.appendChild(mc);}
      cell.appendChild(chips);

      cell.addEventListener('click',()=>{
        selDate=dstr;
        if(curView==='range'||curView==='all'||curView==='past')switchView('day');
        else{renderCal();renderMemos();}
      });
    }
    cont.appendChild(cell);
    cur.setDate(cur.getDate()+1);
  }
}

// ── 메모 목록 렌더 ──
function renderMemos(){
  const list=document.getElementById('memo-list');
  const lbl=document.getElementById('mem-date-label');
  let items=[];
  const todayStr=ds(new Date());

  if(curView==='day'){
    items=memos.filter(m=>{
      if(!m.start)return false;
      if(!m.end||m.end===m.start)return m.start===selDate;
      return m.start<=selDate&&selDate<=m.end;
    });
    const d=new Date(selDate+'T00:00:00');
    lbl.textContent=d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일';
    list.classList.remove('grid-mode');
  }else if(curView==='range'){
    items=memos.filter(m=>m.end&&m.end!==m.start).sort((a,b)=>a.start.localeCompare(b.start));
    lbl.textContent='기간별 메모 (주별)';
    list.classList.remove('grid-mode');
  }else if(curView==='past'){
    // 지난 메모: 종료일(또는 시작일)이 오늘 이전인 메모
    items=memos.filter(function(m){
      if(!m.start)return false;
      const endDate=m.end&&m.end!==m.start?m.end:m.start;
      return endDate<todayStr;
    }).sort((a,b)=>b.start.localeCompare(a.start)); // 최근 것이 위
    lbl.textContent='⏰ 지난 메모';
    list.classList.remove('grid-mode');
  }else{
    // 전체: 오늘 이후 메모만 (지난 것은 별도 탭으로)
    items=memos.filter(function(m){
      if(!m.start)return true;
      const endDate=m.end&&m.end!==m.start?m.end:m.start;
      return endDate>=todayStr;
    }).sort((a,b)=>a.start.localeCompare(b.start));
    lbl.textContent='전체 메모 (진행중/예정)';
    list.classList.add('grid-mode');
  }

  list.innerHTML='';
  if(!items.length){
    const emptyMsg=curView==='day'?'이 날의 메모가 없습니다':curView==='past'?'지난 메모가 없습니다':'메모가 없습니다';
    list.innerHTML='<div class="empty">📋<br><br>'+emptyMsg+'<br><small style="color:var(--dim)">+ 메모 추가를 눌러 작성하세요</small></div>';
    return;
  }

  const compact=(curView==='all');

  if(curView==='range'){
    // 주 단위 그룹화 (해당 메모 시작일 기준, 일요일~토요일)
    const groups={}; // key: weekStartStr -> items
    items.forEach(function(m){
      const d=new Date(m.start+'T00:00:00');
      const weekStart=new Date(d); weekStart.setDate(d.getDate()-d.getDay());
      const wkey=ds(weekStart);
      if(!groups[wkey])groups[wkey]=[];
      groups[wkey].push(m);
    });
    const sortedKeys=Object.keys(groups).sort();
    sortedKeys.forEach(function(wkey){
      const wStart=new Date(wkey+'T00:00:00');
      const wEnd=new Date(wStart); wEnd.setDate(wStart.getDate()+6);
      const header=document.createElement('div');
      header.className='week-header';
      header.textContent='📆 '+(wStart.getMonth()+1)+'/'+wStart.getDate()+' ~ '+(wEnd.getMonth()+1)+'/'+wEnd.getDate()+' 주';
      list.appendChild(header);
      groups[wkey].forEach(function(m){list.appendChild(buildMemoCard(m,false));});
    });
    return;
  }

  items.forEach(function(m){
    list.appendChild(buildMemoCard(m,compact));
  });
}

function buildMemoCard(m,compact){
    const card=document.createElement('div');
    const shouldBlink=m.forceBlink||(m.alarm&&isAlarmNow(m))||(flashNewMemoId===m.id);
    card.className='mcard'+(compact?' compact':'')+(shouldBlink?' blink':'');
    card.style.borderLeftColor=m.color||'#3b82f6';
    if(m.bgColor)card.style.background=m.bgColor;
    if(m.textColor)card.style.color=m.textColor;

    // 상단 행
    const top=document.createElement('div');top.className='mct';
    const dot=document.createElement('div');dot.style.cssText='width:8px;height:8px;border-radius:2px;background:'+(m.color||'#3b82f6')+';flex-shrink:0;margin-top:3px';
    const ttl=document.createElement('div');ttl.className='mctitle';ttl.textContent=m.title||'(제목없음)';
    if(m.textColor)ttl.style.color=m.textColor;
    const acts=document.createElement('div');acts.className='mcacts';

    const eb=document.createElement('button');eb.className='mcbtn';eb.textContent='✏️';eb.title='편집';
    eb.addEventListener('click',function(){doEdit(m.id);});

    const db=document.createElement('button');db.className='mcbtn';db.textContent='🗑️';db.title='삭제';
    db.addEventListener('click',function(){doDelete(m.id);});

    acts.appendChild(eb);acts.appendChild(db);
    top.appendChild(dot);top.appendChild(ttl);top.appendChild(acts);
    card.appendChild(top);

    if(m.body){
      const bd=document.createElement('div');bd.className='mcbody';bd.innerHTML=esc(m.body).replace(/\n/g,'<br>');
      if(m.textColor)bd.style.color=m.textColor;
      card.appendChild(bd);
    }

    const foot=document.createElement('div');foot.className='mcfoot';
    const dr=m.end&&m.end!==m.start?m.start+' ~ '+m.end:m.start;
    const db2=document.createElement('span');db2.className='dbadge';db2.textContent='📅 '+dr;foot.appendChild(db2);
    if(m.author){const aub=document.createElement('span');aub.className='dbadge';aub.style.color='var(--accent)';aub.textContent='👤 '+m.author;foot.appendChild(aub);}
    if(m.alarm&&m.alarmDate){const ab=document.createElement('span');ab.className='abadge';ab.textContent='🔔 '+(m.alarmDate||'')+' '+(m.alarmTime||'');foot.appendChild(ab);}
    card.appendChild(foot);
    return card;
}

// ── 삭제 ──
function doDelete(id){
  if(!window.confirm('이 메모를 삭제할까요? (휴지통에서 7일간 복구 가능)'))return;
  const target=memos.find(function(m){return m.id===id;});
  memos=memos.filter(function(m){return m.id!==id;});
  if(alarmTimers[id]){clearTimeout(alarmTimers[id]);delete alarmTimers[id];}
  saveMemos();
  if(target)moveToTrash('memo',target);
  renderCal();
  renderMemos();
}

// ── 편집 모달 열기 ──
function doEdit(id){
  const m=memos.find(function(x){return x.id===id;});
  if(!m)return;
  editId=id;
  document.getElementById('modal-ttl').textContent='메모 편집';
  document.getElementById('f-title').value=m.title||'';
  document.getElementById('f-body').value=m.body||'';
  document.getElementById('f-start').value=m.start||'';
  document.getElementById('f-end').value=m.end||'';
  document.getElementById('f-alarm').checked=!!m.alarm;
  document.getElementById('f-adate').value=m.alarmDate||'';
  document.getElementById('f-atime').value=m.alarmTime||'';
  document.getElementById('alarm-rows').style.display=m.alarm?'block':'none';
  selColor=m.color||COLORS[0].h;
  selTextColor=m.textColor||TEXT_COLORS[0].h;
  selBgColor=m.bgColor||BG_COLORS[0].h;
  document.getElementById('f-blink').checked=!!m.forceBlink;
  buildSwatches();
  document.getElementById('ov-memo').classList.add('on');
}

// ── 알람 ──
function isAlarmNow(m){
  if(!m.alarmDate||!m.alarmTime)return false;
  if(m.alarmDate!==ds(new Date()))return false;
  const now=new Date();
  const[h,mm]=m.alarmTime.split(':');
  return Math.abs(now.getHours()*60+now.getMinutes()-parseInt(h)*60-parseInt(mm))<=1;
}
function schedAlarms(){
  Object.values(alarmTimers).forEach(function(t){clearTimeout(t);});alarmTimers={};
  memos.forEach(function(m){
    if(!m.alarm||!m.alarmDate||!m.alarmTime)return;
    const t=new Date(m.alarmDate+'T'+m.alarmTime+':00');
    const now=new Date();
    if(t<=now)return;
    alarmTimers[m.id]=setTimeout(function(){
      if(Notification.permission==='granted')new Notification('📝 메모 알림',{body:m.title});
      renderMemos();
    },t-now);
  });
}

function buildSwatchGroup(containerId, colorList, getCurrent, setCurrent){

    const sw=document.createElement('div');
    sw.className='csw'+(c.h===getCurrent()?' on':'');
    sw.style.background=c.h;sw.title=c.n;

    sw.addEventListener('click',function(){

      cont.querySelectorAll('.csw').forEach(function(s){s.classList.toggle('on',s.dataset.hex===c.h);});
    });
    cont.appendChild(sw);
  });
}

function saveComment(boardType, postId, text){
  // boardType: 'board' or 'board2'
  const ref=db.ref(boardType+'/'+postId+'/comments');
  const cid='c'+Date.now();
  ref.child(cid).set({
    id:cid, text, author:myName||'익명', ts:Date.now()
  });
}
function deleteComment(boardType, postId, commentId){
  db.ref(boardType+'/'+postId+'/comments/'+commentId).remove();
}
function buildCommentSection(boardType, post){
  const section=document.createElement('div');
  section.className='comment-section';
  const title=document.createElement('div');title.className='comment-title';
  const comments=Object.values(post.comments||{}).sort(function(a,b){return(a.ts||0)-(b.ts||0);});
  title.textContent='💬 댓글 '+comments.length+'개';
  section.appendChild(title);
  const list=document.createElement('div');list.className='comment-list';
  comments.forEach(function(c){
    const item=document.createElement('div');item.className='comment-item';
    const hdr=document.createElement('div');hdr.className='comment-header';
    hdr.innerHTML='<span class="comment-author">'+esc(c.author||'익명')+'</span>'+
      '<span class="comment-time">'+formatCommentTime(c.ts)+'</span>';
    const del=document.createElement('button');del.className='comment-del';del.textContent='✕';del.title='삭제';
    del.addEventListener('click',function(){
      if(!window.confirm('댓글을 삭제할까요?'))return;
      deleteComment(boardType, post.id, c.id);
    });
    hdr.appendChild(del);
    const body=document.createElement('div');body.className='comment-body';body.textContent=c.text||'';
    item.appendChild(hdr);item.appendChild(body);list.appendChild(item);
  });
  section.appendChild(list);
  // 댓글 입력
  const row=document.createElement('div');row.className='comment-input-row';
  const inp=document.createElement('input');inp.className='comment-input';inp.placeholder='댓글을 입력하세요...';
  inp.type='text';
  const send=document.createElement('button');send.className='comment-send';send.textContent='등록';
  send.addEventListener('click',function(){
    const t=inp.value.trim();if(!t)return;
    saveComment(boardType, post.id, t);inp.value='';
  });
  inp.addEventListener('keydown',function(e){if(e.key==='Enter'){send.click();}});
  row.appendChild(inp);row.appendChild(send);section.appendChild(row);
  return section;
}
function formatCommentTime(ts){
  if(!ts)return '';
  const d=new Date(ts);
  return (d.getMonth()+1)+'/'+d.getDate()+' '+p2(d.getHours())+':'+p2(d.getMinutes());
}

// ── 검색 ──
let searchFilter='all';

function highlight(text, keyword){
  if(!keyword||!text)return esc(text||'');
  const escaped=esc(text);
  const escapedKw=keyword.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return escaped.replace(new RegExp('('+escapedKw+')','gi'),'<mark class="search-highlight">$1</mark>');
}

function doSearch(keyword){
  keyword=(keyword||'').trim();
  if(!keyword){
    document.getElementById('ov-search').classList.remove('on');
    return;
  }
  const kw=keyword.toLowerCase();
  const results=[];

  // 메모 검색
  if(searchFilter==='all'||searchFilter==='memo'){
    memos.forEach(function(m){
      const titleMatch=(m.title||'').toLowerCase().includes(kw);
      const bodyMatch=(m.body||'').toLowerCase().includes(kw);
      if(titleMatch||bodyMatch){
        results.push({kind:'memo',id:m.id,title:m.title||'(제목없음)',body:stripHtml(m.body||''),date:m.start||'',author:m.author||'',color:m.color||'#3b82f6',score:titleMatch?2:1});
      }
    });
  }

  // 게시판 검색
  if(searchFilter==='all'||searchFilter==='board'){
    boardPosts.forEach(function(p){
      const titleMatch=(p.title||'').toLowerCase().includes(kw);
      const bodyMatch=stripHtml(p.body||'').toLowerCase().includes(kw);
      if(titleMatch||bodyMatch){
        const dt=new Date(p.ts||Date.now());
        results.push({kind:'board',id:p.id,title:p.title||'(제목없음)',body:stripHtml(p.body||''),date:ds(dt),author:p.author||'',score:titleMatch?2:1});
      }
    });
  }

  // 채팅 검색
  if(searchFilter==='all'||searchFilter==='chat'){
    chatMsgs.forEach(function(m){
      if((m.text||'').toLowerCase().includes(kw)){
        const dt=new Date(m.ts||Date.now());
        results.push({kind:'chat',id:m.id,title:m.author||'익명',body:m.text||'',date:ds(dt)+' '+p2(dt.getHours())+':'+p2(dt.getMinutes()),author:m.author||'',score:1});
      }
    });
  }

  // 점수 높은 순 정렬
  results.sort(function(a,b){return b.score-a.score;});

  renderSearchResults(results, keyword);
  document.getElementById('ov-search').classList.add('on');
}

function stripHtml(html){
  const tmp=document.createElement('div');tmp.innerHTML=html;return tmp.textContent||tmp.innerText||'';
}

function renderSearchResults(results, keyword){
  const cont=document.getElementById('search-results');
  const count=document.getElementById('search-result-count');
  count.textContent=results.length+'건 검색됨';

  if(!results.length){
    cont.innerHTML='<div class="search-empty">검색 결과가 없습니다.<br><small style="color:var(--dim)">다른 키워드로 검색해보세요</small></div>';
    return;
  }

  const list=document.createElement('div');list.className='search-results-list';
  results.forEach(function(r){
    const item=document.createElement('div');
    item.className='search-item';
    if(r.kind==='memo')item.style.borderLeftColor=r.color||'#3b82f6';
    else if(r.kind==='board')item.style.borderLeftColor='#6366f1';
    else item.style.borderLeftColor='#22c55e';

    const kindLabel=r.kind==='memo'?'📝 메모':r.kind==='board'?'📌 게시판':'💬 채팅';
    const kindCls='kind-'+r.kind;

    item.innerHTML=
      '<div class="search-item-header">'+
      '<span class="search-item-kind '+kindCls+'">'+kindLabel+'</span>'+
      '<span class="search-item-title">'+highlight(r.title,keyword)+'</span>'+
      '</div>'+
      (r.body?'<div class="search-item-body">'+highlight(r.body.slice(0,150),keyword)+'</div>':'')+
      '<div class="search-item-meta">📅 '+esc(r.date)+(r.author?' · 👤 '+esc(r.author):'')+'</div>';

    // 클릭 시 해당 항목으로 이동
    item.addEventListener('click',function(){
      document.getElementById('ov-search').classList.remove('on');
      if(r.kind==='memo'){
        switchMainTab('cal');
        selDate=r.date||selDate;
        switchView('day');
      }else if(r.kind==='board'){
        switchMainTab('board');
        // 해당 게시글 강조 (잠시 blink)
        setTimeout(function(){
          const posts=document.querySelectorAll('.boardpost');
          posts.forEach(function(el){if(el.dataset.id===r.id)el.scrollIntoView({behavior:'smooth',block:'center'});});
        },300);
      }else if(r.kind==='chat'){
        switchMainTab('chat');
        setTimeout(function(){scrollChatToBottom();},300);
      }
    });
    list.appendChild(item);
  });
  cont.innerHTML='';
  cont.appendChild(list);
}

function doEditBoard(id){
  const p=boardPosts.find(function(x){return x.id===id;});
  if(!p)return;
  editBoardId=id;
  document.getElementById('board-modal-ttl').textContent='게시글 편집';

  document.getElementById('btn-board-save').onclick=function(){doSaveBoard();};
  document.getElementById('ov-board').classList.add('on');

function doDeleteBoard(id){
  if(!window.confirm('이 게시글을 삭제할까요? (휴지통에서 7일간 복구 가능)'))return;
  const target=boardPosts.find(function(p){return p.id===id;});
  boardPosts=boardPosts.filter(function(p){return p.id!==id;});
  saveBoardPosts();
  if(target)moveToTrash('board',target);
  renderBoard();
}
function doSaveBoard(){
  const title=document.getElementById('bf-title').value.trim();
  if(!title){alert('제목을 입력해주세요.');return;}
  const bodyEl=document.getElementById('bf-body');
  const body=bodyEl.innerHTML.trim();
  const forceBlink=document.getElementById('bf-blink').checked;
  const pwOn=document.getElementById('bf-pw-on').checked;
  const password=pwOn?document.getElementById('bf-pw').value.trim():'';
  if(pwOn&&!password){alert('비밀번호를 입력해주세요.');return;}
  const author=myName||'익명';
  if(body.length>700000){alert('내용(특히 이미지)이 너무 큽니다. 이미지를 줄이거나 개수를 줄여주세요.');return;}
  const links=[...attachLinks];
  if(editBoardId!==null){
    const idx=boardPosts.findIndex(function(p){return p.id===editBoardId;});
    if(idx!==-1){
      const orig=boardPosts[idx];
      boardPosts[idx]={id:editBoardId,title,body,forceBlink,password,attachLinks:links,author:orig.author||author,editedBy:author,ts:orig.ts||Date.now(),comments:orig.comments||{}};
    }
  }else{
    const newId='b'+Date.now();
    boardPosts.push({id:newId,title,body,forceBlink,password,attachLinks:links,author,ts:Date.now(),comments:{}});
  }
  saveBoardPosts();
  document.getElementById('ov-board').classList.remove('on');
  renderBoard();
}

// ── 이미지 삽입 (리사이즈 후 base64로 contenteditable에 삽입) ──
function insertImageFile(file){
  if(!file||!file.type.startsWith('image/'))return;
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const MAX_W=700;
      let w=img.width,h=img.height;
      if(w>MAX_W){h=Math.round(h*MAX_W/w);w=MAX_W;}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      const dataUrl=canvas.toDataURL('image/jpeg',0.75);
      insertHtmlAtCursor('<img src="'+dataUrl+'">');
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

let attachLinks=[]; // [{name,url}]

function getFileIcon(url){
  const u=(url||'').toLowerCase();
  if(u.includes('drive.google.com'))return '📁';
  if(u.match(/\.(pdf)($|\?)/))return '📄';
  if(u.match(/\.(xlsx?|csv)($|\?)/))return '📊';
  if(u.match(/\.(docx?)($|\?)/))return '📝';
  if(u.match(/\.(pptx?)($|\?)/))return '📊';
  if(u.match(/\.(zip|rar|7z)($|\?)/))return '🗜️';
  if(u.match(/\.(jpe?g|png|gif|webp)($|\?)/))return '🖼️';
  return '🔗';
}

function moveToTrash(kind,item){
  // kind: 'memo' or 'board'
  const tid='t'+Date.now()+Math.floor(Math.random()*1000);
  const trashEntry={tid,kind,deletedAt:Date.now(),deletedBy:myName||'익명',data:item};
  trashRef.child(tid).set(trashEntry);
}
function purgeOldTrash(){
  const cutoff=Date.now()-TRASH_KEEP_DAYS*86400000;
  trashItems.forEach(function(t){
    if(t.deletedAt<cutoff)trashRef.child(t.tid).remove();
  });
}
function renderTrash(){
  const cont=document.getElementById('trash-list');
  cont.innerHTML='';
  if(!trashItems.length){
    cont.innerHTML='<div style="color:var(--dim);font-size:12px;padding:10px 0;text-align:center;">휴지통이 비어있습니다.</div>';
    return;
  }
  const sorted=[...trashItems].sort(function(a,b){return b.deletedAt-a.deletedAt;});
  sorted.forEach(function(t){
    const el=document.createElement('div');el.className='trash-item';
    const kindLabel=t.kind==='memo'?'📝 메모':'📌 게시글';
    const title=(t.data&&t.data.title)||'(제목없음)';
    const dt=new Date(t.deletedAt);
    const remainDays=Math.max(0,Math.ceil(TRASH_KEEP_DAYS-(Date.now()-t.deletedAt)/86400000));
    el.innerHTML='<div class="trash-info"><span class="trash-kind">'+kindLabel+'</span><span class="trash-title">'+esc(title)+'</span>'+
      '<span class="trash-meta">'+ds(dt)+' '+p2(dt.getHours())+':'+p2(dt.getMinutes())+' · '+esc(t.deletedBy||'')+' 삭제 · '+remainDays+'일 후 영구삭제</span></div>';
    const btnRestore=document.createElement('button');btnRestore.className='baadd';btnRestore.textContent='복구';
    btnRestore.addEventListener('click',function(){restoreFromTrash(t.tid);});
    const btnPurge=document.createElement('button');btnPurge.className='anidel';btnPurge.textContent='🗑️';btnPurge.title='영구삭제';
    btnPurge.addEventListener('click',function(){

      trashRef.child(t.tid).remove();
    });
    const btns=document.createElement('div');btns.style.cssText='display:flex;gap:6px;flex-shrink:0;';
    btns.appendChild(btnRestore);btns.appendChild(btnPurge);
    el.appendChild(btns);
    cont.appendChild(el);
  });
}
function restoreFromTrash(tid){
  const t=trashItems.find(function(x){return x.tid===tid;});
  if(!t)return;
  if(t.kind==='memo'){
    memos.push(t.data);
    saveMemos();
    renderCal();renderMemos();schedAlarms();
  }else if(t.kind==='board'){
    boardPosts.push(t.data);
    saveBoardPosts();
    renderBoard();
  }
  trashRef.child(tid).remove();
}
